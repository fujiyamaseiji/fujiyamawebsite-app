<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>旧暦カレンダー 2026年</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: 'Hiragino Mincho ProN', 'Yu Mincho', 'Times New Roman', serif;
        background: #f0f0f0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px 16px;
      }

      .container {
        text-align: center;
        max-width: 480px;
        width: 100%;
      }

      h1 {
        font-size: 1.8rem;
        color: #222;
        letter-spacing: 0.08em;
        margin-bottom: 6px;
      }

      .nengo {
        font-size: 0.85rem;
        color: #555;
        letter-spacing: 0.15em;
        margin-bottom: 32px;
      }

      .month-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 10px;
      }

      .month-btn {
        display: block;
        padding: 14px 8px;
        background: #2a2a2a;
        color: #ddd;
        text-decoration: none;
        font-size: 1rem;
        font-family: 'Hiragino Kaku Gothic ProN', 'Yu Gothic', sans-serif;
        border-radius: 6px;
        letter-spacing: 0.05em;
        transition: background 0.15s;
      }

      .month-btn:hover {
        background: #444;
      }

      .month-btn.current {
        background: #e07000;
        color: #fff;
        font-weight: bold;
      }

      .note {
        margin-top: 20px;
        font-size: 0.75rem;
        color: #888;
        font-family: 'Hiragino Kaku Gothic ProN', 'Yu Gothic', sans-serif;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>2026年（令和8年）</h1>
      <div class="nengo">旧暦カレンダー</div>
      <div class="month-grid" id="grid"></div>
      <p class="note" id="note"></p>
    </div>
    <script>
      const MONTHS = ['1月', '2月', '3月', '4月', '5月', '6月', '7月', '8月', '9月', '10月', '11月', '12月'];
      const FILES = ['01.html', '02.html', '03.html', '04.html', '05.html', '06.html',
        '07.html', '08.html', '09.html', '10.html', '11.html', '12.html'];

      const today = new Date();
      const currentMonth = (today.getFullYear() === 2026) ? today.getMonth() : -1; // 0-indexed

      // 当月へ自動ジャンプ
      if (currentMonth >= 0) {
        window.location.replace(FILES[currentMonth]);
      }

      // ジャンプしない場合のリンク一覧を表示
      const grid = document.getElementById('grid');
      MONTHS.forEach((label, i) => {
        const a = document.createElement('a');
        a.href = FILES[i];
        a.textContent = label;
        a.className = 'month-btn' + (i === currentMonth ? ' current' : '');
        grid.appendChild(a);
      });

      if (currentMonth >= 0) {
        document.getElementById('note').textContent = '自動移動しない場合は下のボタンをタップしてください';
      }
    </script>
  </body>
</html>
